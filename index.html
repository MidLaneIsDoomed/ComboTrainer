<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div id="pressedKey-container">  

        <p id="end-message"></p>
        <p id="restart"></p>

        <div id="pressBorder" tabindex="0"></div> 
        <div id="clickBlocker"></div>

        <img id="first-dummy" class="dummies" tabindex="0" src="/images/Enemy_Target_Dummy_Render.webp" alt="">
        <img id="second-dummy-F" class="dummies" tabindex="0" src="/images/Enemy_Target_Dummy_Render.webp" alt="">
        <img id="second-dummy" class="dummies" tabindex="0" src="/images/Enemy_Target_Dummy_Render.webp" alt="">

    </div>

    <div class="output-container">

         <div id="first-output" class="output12">

            <div class="outputs" id="Eoutput">E</div>
            <div class="outputs" id="Qoutput">Q</div>
            <div class="outputs" id="Foutput">F</div>

        </div>

        <div id="combo-timer">1.00</div>

        <div id="second-output" class="output12">

            <div class="outputs" id="2Eoutput">E</div>
            <div class="outputs" id="2Qoutput">Q</div>
            <div class="outputs" id="2Routput">R</div>

        </div>

    </div>

    <div class="stats">

        <h3>Stats</h3>
        <p id="points">Score:</p>

    </div>

    <button id="stats-button" onclick="resetStats()">Reset</button>



 
    <script src="JS/logic.js"></script>

</body>
</html>
